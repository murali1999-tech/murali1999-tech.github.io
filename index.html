<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsDaily - Latest News, Education, Jobs & More</title>
    <meta name="description"
        content="Get latest news, education updates, jobs, technology, devotional content and more on NewsDaily. Stay updated with trending topics in India 2026.">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RSRL58XHV4"></script>
    <script> window.dataLayer = window.dataLayer || []; function gtag() { dataLayer.push(arguments); } gtag('js', new Date()); gtag('config', 'G-RSRL58XHV4'); </script>
    <style>
        :root {
            --primary: #0077cc;
            --dark: #222;
            --bg: #f4f4f4;
            --card: #ffffff;
            --text: #222;
        }

        body.dark {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #f1f1f1;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
        }

        header {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background: var(--dark);
            padding: 10px;
            text-align: center;
            position: sticky;
            top: 0;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .card a {
            text-decoration: none;
            font-weight: bold;
            color: var(--text);
        }

        .search-box {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
        }

        .toggle-btn {
            margin-top: 10px;
            padding: 8px 12px;
            border: none;
            cursor: pointer;
        }

        footer {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>
    <header>
        <h1>NewsDaily</h1>
        <p>Latest News • Education • Jobs • Technology • Devotional</p> <button class="toggle-btn"
            onclick="toggleDarkMode()">🌙 Toggle</button>
    </header>
    <nav> <a href="/news/">News</a> <a href="/education/">Education</a> <a href="/jobs/">Jobs</a> <a
            href="/technology/">Technology</a> <a href="/devotional/">Devotional</a> <a href="/travel/">Travel</a>
    </nav>
    <div class="container">
        <h2>Latest News (Auto Updated)</h2>
        <div id="news-container" class="grid"></div>
        <h2>Explore Categories</h2> <input type="text" id="search" class="search-box" placeholder="Search category...">
        <div class="grid" id="grid">
            <div class="card"><a href="/news/">Latest News</a>
                <p>Breaking news</p>
            </div>
            <div class="card"><a href="/education/">Education</a></div>
            <div class="card"><a href="/jobs/">Jobs</a></div>
            <div class="card"><a href="/technology/">Technology</a></div>
            <div class="card"><a href="/movies/">Movies</a></div>
            <div class="card"><a href="/devotional/">Devotional</a></div>
            <div class="card"><a href="/travel/">Travel</a></div>
            <div class="card"><a href="/scam/">Scam Alerts</a></div>
        </div>
    </div>
    <footer>
        <p>© <span id="year"></span> NewsDaily | Created by Murali</p>
    </footer>
   <script>
// Dark mode
function toggleDarkMode(){
    document.body.classList.toggle("dark");
}

// Year
document.getElementById("year").textContent = new Date().getFullYear();

// Search
document.getElementById("search").addEventListener("keyup", function(){
    let val = this.value.toLowerCase();
    document.querySelectorAll("#grid .card").forEach(card=>{
        card.style.display = card.innerText.toLowerCase().includes(val) ? "block" : "none";
    });
});

// RSS feeds
const feeds = [
    "https://news.google.com/rss?hl=en-IN&gl=IN&ceid=IN:en",
    "https://feeds.bbci.co.uk/news/world/rss.xml"
];

// Load news
async function loadNews() {

    const container = document.getElementById("news-container");
    container.innerHTML = "Loading latest news...";

    try {
        const res = await fetch("https://YOUR-BACKEND-URL/news");
        const json = await res.json();

        const all = json.data;

        container.innerHTML = "";

        all.forEach(item => {
            let div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <a href="${item.link}" target="_blank">${item.title}</a>
                <p>${item.pubDate ? item.pubDate.substring(0,16) : ""}</p>
            `;

            container.appendChild(div);
        });

    } catch (err) {
        container.innerHTML = "⚠️ News server not responding";
    }
}

loadNews();
setInterval(loadNews, 600000);

        if (all.length === 0) {
            container.innerHTML = "⚠️ No news loaded";
            return;
        }

        // Sort latest first
        all.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

        // Remove duplicates
        const seen = new Set();
        all = all.filter(item => {
            if (!item.link || seen.has(item.link)) return false;
            seen.add(item.link);
            return true;
        });

        // Display
        container.innerHTML = "";

        all.slice(0, 8).forEach(item => {
            let div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <a href="${item.link}" target="_blank" rel="noopener noreferrer">
                    ${item.title}
                </a>
                <p>${item.pubDate ? item.pubDate.substring(0,16) : ""}</p>
            `;

            container.appendChild(div);
        });

    } catch (err) {
        console.error(err);
        container.innerHTML = "⚠️ Failed to load news";
    }
}

// Run once
loadNews();

// Auto refresh every 10 min
setInterval(loadNews, 600000);
</script>

</body>

</html>
