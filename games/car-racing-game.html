<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Car Racing Game</title> <meta name="description" content="Play a simple car racing dodge game using Phaser.js. Avoid traffic and score high!"> <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script> <style> body { margin: 0; background: #111; color: white; font-family: Arial; text-align: center; } #title { padding: 10px; font-size: 22px; font-weight: bold; } </style> </head> <body> <div id="title">🚗 Car Dodge Racing</div> <script> let player; let enemies; let cursors; let score = 0; let scoreText; let gameOver = false; const config = { type: Phaser.AUTO, width: 400, height: 600, backgroundColor: "#222", physics: { default: "arcade", arcade: { debug: false } }, scene: { create: create, update: update } }; new Phaser.Game(config); function create() { player = this.add.rectangle(200, 520, 40, 80, 0x00ff00); this.physics.add.existing(player); enemies = this.physics.add.group(); cursors = this.input.keyboard.createCursorKeys(); scoreText = this.add.text(10, 10, "Score: 0", { fill: "#fff" }); this.time.addEvent({ delay: 1200, callback: () => spawnEnemy(this), loop: true }); this.physics.add.overlap(player, enemies, hitEnemy, null, this); } function update() { if (gameOver) return; if (cursors.left.isDown) { player.x -= 5; } else if (cursors.right.isDown) { player.x += 5; } // Keep player inside road player.x = Phaser.Math.Clamp(player.x, 40, 360); enemies.getChildren().forEach(enemy => { if (enemy.y > 600) { enemy.destroy(); score++; scoreText.setText("Score: " + score); } }); } function spawnEnemy(scene) { const lanes = [80, 160, 240, 320]; const x = Phaser.Utils.Array.GetRandom(lanes); const enemy = scene.add.rectangle(x, 0, 40, 80, 0xff0000); scene.physics.add.existing(enemy); enemy.body.setVelocityY(250); enemies.add(enemy); } function hitEnemy(player, enemy) { gameOver = true; enemy.destroy(); this.scene.pause(); this.add.text(120, 300, "💥 Game Over", { fontSize: "28px", fill: "#fff" }); } </script> </body> </html>
