<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Car Racing Game</title> <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script> <style> body { margin: 0; background: #000; text-align: center; color: white; } </style> </head> <body> <script> let player; let enemies; let cursors; let score = 0; let scoreText; let gameOver = false; let roadLines = []; const config = { type: Phaser.AUTO, width: 400, height: 600, backgroundColor: "#333", physics: { default: "arcade" }, scene: { create, update } }; new Phaser.Game(config); function create() { // ROAD LINES for (let i = 0; i < 10; i++) { let line = this.add.rectangle(200, i * 60, 10, 40, 0xffffff); roadLines.push(line); } // PLAYER CAR player = this.add.rectangle(200, 500, 40, 80, 0x00ff00); this.physics.add.existing(player); enemies = this.physics.add.group(); cursors = this.input.keyboard.createCursorKeys(); scoreText = this.add.text(10, 10, "Score: 0", { fontSize: "18px", fill: "#fff" }); this.time.addEvent({ delay: 1200, callback: () => spawnEnemy(this), loop: true }); this.physics.add.overlap(player, enemies, hitEnemy, null, this); } function update() { if (gameOver) return; // MOVE CAR if (cursors.left.isDown) player.x -= 6; else if (cursors.right.isDown) player.x += 6; player.x = Phaser.Math.Clamp(player.x, 50, 350); // ROAD ANIMATION roadLines.forEach(line => { line.y += 5; if (line.y > 600) line.y = 0; }); // ENEMIES enemies.getChildren().forEach(enemy => { enemy.y += 5; if (enemy.y > 600) { enemy.destroy(); score++; scoreText.setText("Score: " + score); } }); } function spawnEnemy(scene) { const lanes = [80, 160, 240, 320]; const x = Phaser.Utils.Array.GetRandom(lanes); const enemy = scene.add.rectangle(x, 0, 40, 80, 0xff0000); scene.physics.add.existing(enemy); enemies.add(enemy); } function hitEnemy() { gameOver = true; this.add.text(120, 300, "💥 GAME OVER", { fontSize: "28px", fill: "#fff" }); this.scene.pause(); } </script> </body> </html>
